name: first_app
description: "BahirLink Emergency Response System - User App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # --- Internationalization & Localization ---
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2

  # --- Video call (WebRTC) ---
  flutter_webrtc: ^0.12.12
  
  # --- Real-time & Networking ---
  socket_io_client: ^2.0.3
  http: ^1.1.0

  # --- Audio & Recording ---
  record: ^5.1.2
  audioplayers: ^6.0.0

  # --- State & Storage ---
  shared_preferences: ^2.1.0
  device_info_plus: ^12.3.0

  # --- Animations ---
  animate_do: ^3.0.0

  # --- Verification / Image Handling ---
  image_picker: ^1.0.0
  flutter_image_compress: ^2.4.0
  path: ^1.9.0

  # --- FREE OpenStreetMap Support ---
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # --- GPS Location ---
  geolocator: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  # This flag is required if you use l10n/arb files for translations
  generate: true 
  uses-material-design: true

  assets:
    - assets/images/bg.jpg
    - assets/images/logo.webp
    - assets/images/avatar.jpg

# --- App Icon Configuration ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.webp"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.webp"